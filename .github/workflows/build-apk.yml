name: Build Flutter APK

on:
  push:
    branches: [flutter-android-app]
    paths:
      - 'expense_tracker_app/**'
      - '.github/workflows/build-apk.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: expense_tracker_app

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.29.1'
          channel: stable
          cache: true

      - name: Generate Android platform files
        run: |
          flutter create --platforms android --org com.steaunk --no-pub .
          git checkout pubspec.yaml test/widget_test.dart

      - name: Install dependencies
        run: flutter pub get

      - name: Run code generation (Drift + Freezed)
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Analyze
        run: flutter analyze --no-fatal-infos

      - name: Build APK
        run: flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: expense-tracker-apk
          path: expense_tracker_app/build/app/outputs/flutter-apk/app-release.apk
