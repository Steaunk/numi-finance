name: Build Flutter APK

on:
  push:
    branches: [main]
    paths:
      - 'numi_app/**'
      - '.github/workflows/build-apk.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    defaults:
      run:
        working-directory: numi_app

    steps:
      - uses: actions/checkout@v4

      - name: Compute version tag
        id: version
        working-directory: .
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TODAY=$(date -u +%Y%m%d)
          # Count existing releases tagged with today's date
          EXISTING=$(gh release list --json tagName \
            -q "[.[] | select(.tagName | startswith(\"v${TODAY}.\"))] | length" \
            2>/dev/null || echo "0")
          SEQ=$((EXISTING + 1))
          TAG="v${TODAY}.${SEQ}"
          # Build number = YYYYMMDD * 100 + seq (monotonically increasing int)
          BUILD_NUM="${TODAY}$(printf '%02d' $SEQ)"
          TITLE="Numi ${TODAY:0:4}.${TODAY:4:2}.${TODAY:6:2} #${SEQ}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "build_num=$BUILD_NUM" >> "$GITHUB_OUTPUT"
          echo "title=$TITLE" >> "$GITHUB_OUTPUT"

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/wrapper
            ~/.gradle/caches
          key: gradle-${{ runner.os }}-${{ hashFiles('numi_app/pubspec.yaml') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.29.1'
          channel: stable
          cache: true

      - name: Generate Android platform files
        run: |
          flutter create --platforms android --org com.steaunk --no-pub .
          git checkout pubspec.yaml test/widget_test.dart \
            android/app/src/main/res/values/strings.xml \
            android/app/src/main/AndroidManifest.xml \
            android/app/src/main/res/xml/open_filex_provider_paths.xml

      - name: Set up release signing
        if: env.KEYSTORE_BASE64 != ''
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 -d > android/app/numi-release.jks
          cat > android/key.properties <<EOF
          storePassword=$STORE_PASSWORD
          keyPassword=$KEY_PASSWORD
          keyAlias=$KEY_ALIAS
          storeFile=numi-release.jks
          EOF
          # Strip leading whitespace from key.properties (YAML heredoc artifact)
          sed -i 's/^[[:space:]]*//' android/key.properties
          # Patch build.gradle.kts to use release signing
          python3 - <<'PYEOF'
          import re, pathlib
          # Flutter 3.29+ generates Kotlin DSL; fall back to Groovy if needed
          kts = pathlib.Path('android/app/build.gradle.kts')
          groovy = pathlib.Path('android/app/build.gradle')
          if kts.exists():
              t = kts.read_text()
              header = """import java.util.Properties
          import java.io.FileInputStream

          val keystoreProperties = Properties()
          val keystorePropertiesFile = rootProject.file("key.properties")
          if (keystorePropertiesFile.exists()) {
              keystoreProperties.load(FileInputStream(keystorePropertiesFile))
          }

          """
              t = header + t
              signing = """    signingConfigs {
                  create("release") {
                      keyAlias = keystoreProperties["keyAlias"] as String?
                      keyPassword = keystoreProperties["keyPassword"] as String?
                      storeFile = keystoreProperties["storeFile"]?.let { file(it as String) }
                      storePassword = keystoreProperties["storePassword"] as String?
                  }
              }
          """
              t = t.replace('    buildTypes {', signing + '    buildTypes {')
              t = t.replace('signingConfig = signingConfigs.getByName("debug")',
                            'signingConfig = signingConfigs.getByName("release")')
              kts.write_text(t)
          elif groovy.exists():
              t = groovy.read_text()
              header = """def keystoreProperties = new Properties()
          def keystorePropertiesFile = rootProject.file('key.properties')
          if (keystorePropertiesFile.exists()) {
              keystoreProperties.load(new FileInputStream(keystorePropertiesFile))
          }
          """
              t = header + t
              signing = """
              signingConfigs {
                  release {
                      keyAlias keystoreProperties['keyAlias']
                      keyPassword keystoreProperties['keyPassword']
                      storeFile keystoreProperties['storeFile'] ? file(keystoreProperties['storeFile']) : null
                      storePassword keystoreProperties['storePassword']
                  }
              }
          """
              t = t.replace('    buildTypes {', signing + '    buildTypes {')
              t = re.sub(r'(release \{[^}]*?)signingConfig signingConfigs\.debug',
                         r'\1signingConfig signingConfigs.release', t)
              groovy.write_text(t)
          PYEOF

      - name: Install dependencies
        run: flutter pub get

      - name: Run code generation (Drift + Freezed)
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Analyze
        run: flutter analyze --no-fatal-infos

      - name: Build APK
        run: flutter build apk --release --build-number=${{ steps.version.outputs.build_num }}

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: numi-apk
          path: numi_app/build/app/outputs/flutter-apk/app-release.apk

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ steps.version.outputs.tag }}" \
            --repo "${{ github.repository }}" \
            --title "${{ steps.version.outputs.title }}" \
            --notes "Automated build ${{ steps.version.outputs.tag }}" \
            build/app/outputs/flutter-apk/app-release.apk
