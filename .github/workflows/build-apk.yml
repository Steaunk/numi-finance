name: Build Flutter APK

on:
  push:
    branches: [main]
    paths:
      - 'numi_app/**'
      - '.github/workflows/build-apk.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    defaults:
      run:
        working-directory: numi_app

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.29.1'
          channel: stable
          cache: true

      - name: Generate Android platform files
        run: |
          flutter create --platforms android --org com.steaunk --no-pub .
          git checkout pubspec.yaml test/widget_test.dart \
            android/app/src/main/res/values/strings.xml \
            android/app/src/main/AndroidManifest.xml \
            android/app/src/main/res/xml/open_filex_provider_paths.xml

      - name: Install dependencies
        run: flutter pub get

      - name: Run code generation (Drift + Freezed)
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Analyze
        run: flutter analyze --no-fatal-infos

      - name: Build APK
        run: flutter build apk --release --build-number=${{ github.run_number }}

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: numi-apk
          path: numi_app/build/app/outputs/flutter-apk/app-release.apk

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "build-${{ github.run_number }}" \
            --repo "${{ github.repository }}" \
            --title "Numi build ${{ github.run_number }}" \
            --notes "Automated build from CI (run #${{ github.run_number }})" \
            build/app/outputs/flutter-apk/app-release.apk
