services:
  expense-tracker:
    build: .
    ports:
      - "8051:8000"
    volumes:
      - ./data:/app/data
    environment:
      - DEBUG=false
      - DATABASE_PATH=/app/data/db.sqlite3
      - QINIU_ACCESS_KEY=${QINIU_ACCESS_KEY}
      - QINIU_SECRET_KEY=${QINIU_SECRET_KEY}
      - QINIU_BUCKET=${QINIU_BUCKET}
      - QINIU_ENDPOINT=${QINIU_ENDPOINT:-s3-cn-east-1.qiniucs.com}
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/rates/')"]
      interval: 60s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - shared_net

networks:
  shared_net:
    external: true
