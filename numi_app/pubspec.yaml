name: numi_app
description: Numi – personal finance tracker
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.6.0

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Navigation
  go_router: ^14.8.1

  # Local Database
  drift: ^2.22.1
  sqlite3_flutter_libs: ^0.5.28
  path_provider: ^2.1.5
  path: ^1.9.1

  # HTTP Client
  dio: ^5.7.0
  dio_cookie_manager: ^3.1.2
  cookie_jar: ^4.0.8

  # Data Classes
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0

  # Charts
  fl_chart: ^0.70.2

  # Connectivity
  connectivity_plus: ^6.1.1

  # Storage
  shared_preferences: ^2.3.4

  # UI Utilities
  intl: ^0.19.0
  flutter_slidable: ^3.1.1
  flutter_svg: ^2.0.17

  # Update checker
  package_info_plus: ^8.1.0
  url_launcher: ^6.3.1
  open_filex: ^4.7.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.4.14
  drift_dev: ^2.22.1
  freezed: ^2.5.8
  json_serializable: ^6.9.2
  riverpod_generator: ^2.6.3
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  # assets: (icons served from Django API)
